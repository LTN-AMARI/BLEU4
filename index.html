<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLEU4 LOGIN</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Connexion BLEU4</h2>

<input id="login" placeholder="GRADE NOM">
<select id="role">
<option value="membre">MEMBRE</option>
<option value="commandement">COMMANDEMENT</option>
</select>

<input id="pwd" type="password" placeholder="Mot de passe (cmd uniquement)" style="display:none;">

<button onclick="login()">ENTRER</button>

<script>
document.getElementById("role").onchange = (e)=>{
document.getElementById("pwd").style.display =
e.target.value==="commandement" ? "block":"none";
};

function login(){
const v=document.getElementById("login").value.trim();
const role=document.getElementById("role").value;

if(role==="commandement"){
if(document.getElementById("pwd").value!=="BLEU4"){
alert("MDP faux"); return;
}
}

const p=v.split(" ");

const user={
grade:p[0],
nom:p.slice(1).join(" "),
login:v.toUpperCase(),
role
};

localStorage.setItem("BLEU4_USER",JSON.stringify(user));
location.href="app.html";
}
</script>

</body>
</html>
