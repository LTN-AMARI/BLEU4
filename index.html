<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BLEU 4</title>

<link rel="manifest" href="manifest.json">

<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700&family=Share+Tech+Mono&display=swap');

:root {
  --bg: #050505;
  --card: #111111;
  --border: #252525;
  --gold: #c8a84b;
  --gold-light: #e2c66d;
  --text: #ece5d6;
  --muted: #777;
  --green: #46b96b;
  --red: #d84a4a;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url('logo.png') center center no-repeat;
  background-size: 70%;
  opacity: 0.035;
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 520px;
  margin: auto;
  padding-bottom: 100px;
}

header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,10,.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--gold);
  padding: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo-zone {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-zone img {
  width: 42px;
  height: 42px;
  object-fit: contain;
}

.logo-title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 2px;
}

.logo-sub {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  font-family: 'Share Tech Mono', monospace;
}

.badge {
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 6px 10px;
  font-size: 11px;
  letter-spacing: 2px;
  font-family: 'Share Tech Mono', monospace;
}

.content {
  padding: 18px;
}

.calendar-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--gold);
  padding: 18px;
  margin-bottom: 18px;
}

.calendar-title {
  font-size: 28px;
  letter-spacing: 2px;
  margin-bottom: 16px;
}

.event-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--gold);
  margin-bottom: 12px;
  padding: 16px;
}

.event-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.event-date {
  font-family: 'Share Tech Mono', monospace;
  color: var(--gold);
  font-size: 12px;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.event-location {
  color: var(--muted);
  margin-bottom: 12px;
}

.stats {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.pill {
  padding: 4px 10px;
  font-size: 11px;
  font-family: 'Share Tech Mono', monospace;
  border: 1px solid;
}

.yes {
  border-color: var(--green);
  color: var(--green);
}

.no {
  border-color: var(--red);
  color: var(--red);
}

.pending {
  border-color: var(--muted);
  color: var(--muted);
}

.form-box {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 18px;
  margin-top: 20px;
}

.form-title {
  font-size: 24px;
  margin-bottom: 18px;
  color: var(--gold);
  letter-spacing: 2px;
}

.field {
  margin-bottom: 14px;
}

.field label {
  display: block;
  margin-bottom: 6px;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--muted);
  font-family: 'Share Tech Mono', monospace;
}

.field input,
.field textarea,
.field select {
  width: 100%;
  background: #0b0b0b;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px;
  font-size: 15px;
}

.field textarea {
  resize: vertical;
  min-height: 80px;
}

.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

button {
  cursor: pointer;
}

.btn {
  width: 100%;
  background: var(--gold);
  border: none;
  color: #000;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 14px;
  margin-top: 10px;
  font-size: 14px;
}

.btn:hover {
  background: var(--gold-light);
}

.response-zone {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 16px;
}

.response-btn {
  background: transparent;
  padding: 14px;
  border: 1px solid;
  font-size: 14px;
  letter-spacing: 2px;
}

.response-btn.yes {
  color: var(--green);
}

.response-btn.no {
  color: var(--red);
}

.response-btn.active.yes {
  background: var(--green);
  color: black;
}

.response-btn.active.no {
  background: var(--red);
  color: white;
}

.validate-btn {
  width: 100%;
  margin-top: 12px;
  background: var(--gold);
  color: black;
  border: none;
  padding: 14px;
  font-weight: bold;
  letter-spacing: 2px;
}

.member-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.member-name {
  font-size: 18px;
  font-weight: 600;
}

.empty {
  text-align: center;
  color: var(--muted);
  padding: 40px 0;
  letter-spacing: 2px;
}

.footer-space {
  height: 40px;
}

</style>
</head>
<body>

<div class="app">

<header>
  <div class="logo-zone">
    <img src="logo.png" alt="BLEU4">
    <div>
      <div class="logo-title">BLEU 4</div>
      <div class="logo-sub">SYSTEME DE PRESENCE</div>
    </div>
  </div>

  <div class="badge">OPERATIONNEL</div>
</header>

<div class="content">

  <div class="calendar-box">
    <div class="calendar-title">CALENDRIER</div>

    <div class="event-card">
      <div class="event-title">EXERCICE TERRAIN</div>
      <div class="event-date">15 MAI 2026 → 17 MAI 2026</div>
      <div class="event-location">ZONE NORD / ARUE</div>

      <div class="stats">
        <div class="pill yes">12 PRESENTS</div>
        <div class="pill no">3 ABSENTS</div>
        <div class="pill pending">5 ATTENTE</div>
      </div>

      <div class="response-zone">
        <button class="response-btn yes" onclick="choose('yes')">PRESENT</button>
        <button class="response-btn no" onclick="choose('no')">ABSENT</button>
      </div>

      <button class="validate-btn" onclick="validateChoice()">VALIDER</button>
    </div>
  </div>

  <div class="form-box">
    <div class="form-title">NOUVEL ORDRE</div>

    <div class="field">
      <label>INTITULE</label>
      <input type="text" placeholder="EX : MATA'ARA">
    </div>

    <div class="row">
      <div class="field">
        <label>DATE DEBUT</label>
        <input type="date">
      </div>

      <div class="field">
        <label>DATE FIN</label>
        <input type="date">
      </div>
    </div>

    <div class="field">
      <label>LIEU</label>
      <input type="text" placeholder="EX : BASE NORD">
    </div>

    <div class="field">
      <label>DESCRIPTION</label>
      <textarea placeholder="DETAILS OPERATIONNELS"></textarea>
    </div>

    <button class="btn">VALIDER L'ORDRE</button>
  </div>

  <div class="form-box">
    <div class="form-title">PERSONNEL</div>

    <div class="member-row">
      <div class="member-name">LTN AMARI</div>
      <div class="pill yes">PRESENT</div>
    </div>

    <div class="member-row">
      <div class="member-name">SGT PRATZ</div>
      <div class="pill no">ABSENT</div>
    </div>

    <div class="member-row">
      <div class="member-name">1CL TAHAIA</div>
      <div class="pill pending">ATTENTE</div>
    </div>
  </div>

  <div class="footer-space"></div>

</div>
</div>

<script>
let currentChoice = null;

function choose(status) {
  currentChoice = status;

  document.querySelectorAll('.response-btn').forEach(btn => {
    btn.classList.remove('active');
  });

  if(status === 'yes') {
    document.querySelector('.response-btn.yes').classList.add('active');
  }

  if(status === 'no') {
    document.querySelector('.response-btn.no').classList.add('active');
  }
}

function validateChoice() {
  if(!currentChoice) {
    alert('Choisissez PRESENT ou ABSENT');
    return;
  }

  alert('Reponse enregistree : ' + (currentChoice === 'yes' ? 'PRESENT' : 'ABSENT'));
}
</script>

</body>
</html>
