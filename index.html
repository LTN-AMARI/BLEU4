<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BLEU4 – Login</title>
</head>

<body>

<h1>Connexion BLEU4</h1>

<input id="login" placeholder="Login">
<input id="nom" placeholder="Nom">
<input id="grade" placeholder="Grade">

<select id="role">
    <option value="membre">Membre</option>
    <option value="commandement">Commandement</option>
</select>

<button onclick="connect()">Connexion</button>

<script>
function connect() {
    currentUser.login = document.getElementById("login").value;
    currentUser.nom = document.getElementById("nom").value;
    currentUser.grade = document.getElementById("grade").value;
    currentUser.role = document.getElementById("role").value;

    window.location.href = "app.html";
}
</script>

<script src="app-logic.js"></script>

</body>
</html>
