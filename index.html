<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ACTIVITÉES B4</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 id="main-title">ACTIVITÉES B4</h1>

<div id="grade-bar">
    <label>GRADE NOM :</label>
    <input id="gradeNom" placeholder="Ex: SDT PINGOUIN">
</div>

<div id="role-box">
    <label>Rôle :</label>
    <select id="role">
        <option value="membre">MEMBRE</option>
        <option value="commandement">COMMANDEMENT</option>
    </select>

    <div id="password-box" style="display:none;">
        <label>Mot de passe COMMANDEMENT :</label>
        <input id="password" type="password" placeholder="BLEU4ADMIN">
    </div>

    <button onclick="connect()">ENTRER</button>
</div>

<script src="app-logic.js"></script>

<script>
document.getElementById("role").addEventListener("change", function() {
    document.getElementById("password-box").style.display =
        this.value === "commandement" ? "block" : "none";
});

function connect() {
    const gradeNom = document.getElementById("gradeNom").value.trim();
    const role     = document.getElementById("role").value;

    if (!gradeNom) {
        alert("Veuillez entrer votre grade et nom.");
        return;
    }

    if (role === "commandement") {
        const pwd = document.getElementById("password").value;
        if (pwd !== "BLEU4ADMIN") {
            alert("Mot de passe incorrect.");
            return;
        }
    }

    const parts = gradeNom.split(" ");
    currentUser.grade = parts[0];
    currentUser.nom   = parts.slice(1).join(" ");
    currentUser.login = currentUser.nom.toUpperCase();
    currentUser.role  = role;

    window.location.href = "app.html";
}
</script>

</body>
</html>
