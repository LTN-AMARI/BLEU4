<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BLEU4 – Connexion</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #eef2ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 0 10px #0002;
        }

        h1 {
            font-size: 20px;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .simple {
            background: #2563eb;
            color: #fff;
        }

        .cmd {
            background: #1e40af;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h1>CALENDRIER OPÉRATIONNEL BLEU4</h1>

        <button class="simple" onclick="enter('simple')">Accès membre simple</button>
        <button class="cmd" onclick="enter('cmd')">Accès commandement</button>
    </div>

    <script>
        function enter(role) {
            localStorage.setItem("bleu4_role", role);
            window.location.href = "app.html";
        }
    </script>
</body>
</html>
