<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Corrige l'avertissement DevTools -->
    <meta name="mobile-web-app-capable" content="yes">

    <title>BLEU4</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        header {
            text-align: center;
            padding: 20px 0;
        }
        h1 {
            color: #1e3a8a;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 6px;
            background: #e0f2fe;
            color: #0369a1;
        }
    </style>

    <!-- Firebase : à remplir avec les infos de ta console -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

        // ⚠️ Récupère ces valeurs dans ton onglet "Paramètres généraux" Firebase
        const firebaseConfig = {
            apiKey: "TA_API_KEY_ICI",
            authDomain: "TON_AUTH_DOMAIN_ICI",
            projectId: "TON_PROJECT_ID_ICI",
            storageBucket: "TON_STORAGE_BUCKET_ICI",
            messagingSenderId: "TON_MESSAGING_SENDER_ID_ICI",
            appId: "TON_APP_ID_ICI"
        };

        const app = initializeApp(firebaseConfig);
        console.log("Firebase initialisé !");
        window.firebaseApp = app; // pour y accéder dans app.js
    </script>
</head>

<body>
    <header>
        <h1>BLEU4</h1>
        <p>Application web – version propre</p>
    </header>

    <div class="container">
        <h2>Bienvenue</h2>
        <p>Si tu vois cette page, ton site BLEU4 est bien chargé depuis GitHub Pages.</p>

        <div class="status" id="status">
            Initialisation en cours…
        </div>
    </div>

    <!-- Script principal -->
    <script src="app.js"></script>
</body>
</html>
