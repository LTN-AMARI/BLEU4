<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLEU4 – Connexion</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2ff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }

        h1 {
            color: #1e3a8a;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #2742b0;
        }

        #error {
            color: red;
            margin-top: 10px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>BLEU4</h1>

        <button id="simpleBtn">Accès simple</button>
        <button id="cmdBtn">Accès commandement</button>

        <!-- Formulaire simple -->
        <div id="simpleForm" class="hidden">
            <input id="gradeSimple" type="text" placeholder="Grade">
            <input id="nomSimple" type="text" placeholder="Nom">
            <button id="loginSimple">Entrer</button>
        </div>

        <!-- Formulaire commandement -->
        <div id="cmdForm" class="hidden">
            <input id="gradeCmd" type="text" placeholder="Grade">
            <input id="nomCmd" type="text" placeholder="Nom">
            <input id="passCmd" type="password" placeholder="Mot de passe">
            <button id="loginCmd">Connexion commandement</button>
        </div>

        <div id="error"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
