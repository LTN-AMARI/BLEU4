  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap');
    :root {
      --bg: #0a0a0a; --surface: #111111; --border: #222222;

    header { background: var(--surface); border-bottom: 1px solid var(--accent); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .logo { font-family: var(--font-mono); font-size: 16px; color: var(--accent); letter-spacing: 3px; }
    .logo span { color: var(--muted); font-size: 11px; display: block; letter-spacing: 2px; margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .role-badge { font-family: var(--font-mono); font-size: 10px; color: var(--muted); border: 1px solid var(--border); padding: 3px 8px; letter-spacing: 1px; }
    .back-btn { background: none; border: 1px solid var(--border); color: var(--text); font-family: var(--font-mono); font-size: 11px; padding: 6px 12px; cursor: pointer; letter-spacing: 1px; transition: all .15s; }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }
    .content { padding: 20px 18px; }
    .login-screen { padding: 40px 18px; max-width: 480px; margin: 0 auto; }
    .login-logo { text-align: center; margin-bottom: 24px; }
    .login-logo img { width: 100px; height: 100px; object-fit: contain; }
    .login-title { font-family: var(--font-mono); font-size: 22px; color: var(--accent); letter-spacing: 4px; margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: var(--muted); letter-spacing: 2px; margin-bottom: 40px; font-family: var(--font-mono); }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-bottom: 6px; }
    .field input, .field select { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: var(--font-mono); font-size: 14px; padding: 12px 14px; outline: none; transition: border-color .15s; -webkit-appearance: none; }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field select option { background: var(--surface); }
    .btn-primary { width: 100%; background: var(--accent); color: #0a0a0a; border: none; font-family: var(--font-mono); font-size: 13px; font-weight: bold; letter-spacing: 3px; padding: 14px; cursor: pointer; transition: all .15s; margin-top: 8px; }
    .btn-primary:hover { background: #e0c060; }
    .btn-secondary { width: 100%; background: transparent; color: var(--text); border: 1px solid var(--border); font-family: var(--font-mono); font-size: 12px; letter-spacing: 2px; padding: 12px; cursor: pointer; transition: all .15s; margin-top: 8px; }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .calendar-container { max-width: 1200px; margin: 0 auto; }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 10px; }
    .month-title { font-family: var(--font-mono); font-size: 18px; color: var(--accent); letter-spacing: 2px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 20px; }
    .day-header { background: var(--surface); border: 1px solid var(--border); padding: 10px; text-align: center; font-family: var(--font-mono); font-size: 12px; color: var(--accent); letter-spacing: 1px; }
    .calendar-day { background: var(--surface); border: 1px solid var(--border); min-height: 120px; padding: 8px; cursor: pointer; transition: all .15s; position: relative; }
    .calendar-day:hover { border-color: var(--accent); background: #161616; }
    .calendar-day.other-month { opacity: 0.3; pointer-events: none; }
    .day-number { font-family: var(--font-mono); font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: bold; }
    .day-events { display: flex; flex-direction: column; gap: 3px; }
    .day-event { background: var(--accent); color: #0a0a0a; padding: 3px 5px; border-radius: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; font-weight: bold; font-size: 10px; letter-spacing: 0.5px; }
    .day-event:hover { background: #e0c060; }
    .create-form { max-width: 480px; margin: 0 auto; }
    .create-header { font-family: var(--font-mono); font-size: 18px; color: var(--accent); letter-spacing: 3px; margin-bottom: 28px; }
    .event-detail { max-width: 480px; margin: 0 auto; }
    .ev-header { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); padding: 20px; margin-bottom: 20px; }
    .ev-title-big { font-family: var(--font-ui); font-size: 26px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
    .ev-date-big { font-family: var(--font-mono); font-size: 12px; color: var(--accent); letter-spacing: 2px; }
    .ev-desc { font-size: 14px; color: var(--muted); margin-top: 8px; font-family: var(--font-mono); letter-spacing: 1px; }
    .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-bottom: 20px; }
    .stat-box { background: var(--surface); border: 1px solid var(--border); padding: 14px 10px; text-align: center; }
    .stat-num { font-family: var(--font-mono); font-size: 28px; display: block; margin-bottom: 4px; }
    .stat-num.green { color: var(--green); }
    .stat-num.red { color: var(--red); }
    .stat-lbl { font-family: var(--font-mono); font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
    .my-rsvp { background: var(--surface); border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; }
    .my-rsvp-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 3px; margin-bottom: 14px; }
    .rsvp-choice { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .rsvp-yes, .rsvp-no { border: 1px solid; background: transparent; font-family: var(--font-mono); font-size: 13px; letter-spacing: 2px; padding: 14px; cursor: pointer; transition: all .15s; }
    .rsvp-yes { color: var(--green); border-color: var(--green); }
    .rsvp-yes.active { background: var(--green); color: #0a0a0a; }
    .rsvp-no { color: var(--red); border-color: var(--red); }
    .rsvp-no.active { background: var(--red); color: white; }
    .validate-rsvp { width: 100%; margin-top: 12px; background: var(--accent); border: none; color: #0a0a0a; font-family: var(--font-mono); font-size: 13px; font-weight: bold; letter-spacing: 2px; padding: 12px; cursor: pointer; }
    .section-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .attendee-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .attendee-row:last-child { border-bottom: none; }
    .attendee-initial { width: 32px; height: 32px; background: var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 13px; color: var(--accent); flex-shrink: 0; }
    .attendee-name { flex: 1; font-size: 15px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .attendee-status { font-family: var(--font-mono); font-size: 11px; padding: 3px 10px; border: 1px solid; letter-spacing: 1px; }
    .attendee-status.yes { color: var(--green); border-color: var(--green); }
    .attendee-status.no { color: var(--red); border-color: var(--red); }
    .attendee-status.pending { color: var(--muted); border-color: var(--border); }
    .del-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px 6px; transition: color .15s; flex-shrink: 0; }
    .del-btn:hover { color: var(--red); }
    .add-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .add-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: var(--font-mono); font-size: 13px; padding: 11px 14px; outline: none; transition: border-color .15s; }
    .add-row input:focus { border-color: var(--accent); }
    .add-row button { background: var(--accent); border: none; color: #0a0a0a; font-family: var(--font-mono); font-size: 18px; padding: 0 18px; cursor: pointer; font-weight: bold; }
    .connecting { display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: var(--font-mono); color: var(--accent); letter-spacing: 3px; font-size: 13px; flex-direction: column; gap: 16px; }
    .dot-flash { display: flex; gap: 6px; }
    .dot-flash span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: flash 1s infinite; }
    .dot-flash span:nth-child(2) { animation-delay: .2s; }
    .dot-flash span:nth-child(3) { animation-delay: .4s; }
    @keyframes flash { 0%,80%,100% { opacity:.2 } 40% { opacity:1 } }
    .error-msg { color: var(--red); font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; margin-top: 8px; }
    .code-hint { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-top: 6px; }
    .fab { position: fixed; bottom: 24px; right: 24px; background: var(--accent); color: #0a0a0a; border: none; font-family: var(--font-mono); font-size: 12px; font-weight: bold; letter-spacing: 3px; padding: 14px 28px; cursor: pointer; box-shadow: 0 0 20px rgba(200,168,75,.3); transition: all .15s; white-space: nowrap; border-radius: 4px; }
    .fab:hover { background: #e0c060; }
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-family: var(--font-mono); font-size: 12px; letter-spacing: 2px; }
    .empty-icon { font-size: 32px; margin-bottom: 16px; display: block; opacity: .3; } 50%{opacity:.3} }
    .notif-item:last-child { border-bottom: none; }
    .notif-clear:hover { color: var(--accent); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

    .ev-indicators { display: flex; gap: 3px; margin-top: 3px; flex-wrap: wrap; }
    .ev-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .ev-dot.yes { background: var(--green); }
    .ev-dot.no { background: var(--red); }
    .ev-dot.pending { background: var(--muted); }
    .ev-summary { font-family: var(--font-mono); font-size: 9px; margin-top: 2px; }
    .ev-summary .s-yes { color: var(--green); }
    .ev-summary .s-no { color: var(--red); }
  </style>
</head>

        <button onclick="prevMonth()" style="background:none;border:1px solid var(--border);color:var(--text);padding:8px 12px;font-family:var(--font-mono);cursor:pointer;">← PREC</button>
        <div class="month-title">${monthName[month]} ${year}</div>
        <button onclick="nextMonth()" style="background:none;border:1px solid var(--border);color:var(--text);padding:8px 12px;font-family:var(--font-mono);cursor:pointer;">SUIV →</button>
      </div>
      <div class="calendar-grid">`;
  dayNames.forEach(d => { html += `<div class="day-header">${d}</div>`; });
  let cur = new Date(startDate);
  for (let i = 0; i < 42; i++) {
    const isOther = cur.getMonth() !== month;
    const dateStr = fmtStorage(cur);
    const evts = getEventsForDate(dateStr);
    html += `<div class="calendar-day ${isOther ? 'other-month' : ''}">
      <div class="day-number">${cur.getDate()}</div>
      <div class="day-events">${evts.map(ev => `
        <div class="day-event" onclick="goEvent('${ev.id}')">${ev.title}</div>
        ${ev.total > 0 ? `<div class="ev-summary"><span class="s-yes">✓${ev.yes}</span> <span class="s-no">✗${ev.no}</span>${ev.pending > 0 ? ` <span style="color:var(--muted)">?${ev.pending}</span>` : ''}</div>` : ''}
      `).join('')}</div>
    </div>`;
    cur.setDate(cur.getDate() + 1);
  }
  html += `</div></div>`;
  return html;
}

function getEventsForDate(dateStr) {
  const evts = [];
  Object.entries(state.events).forEach(([id, ev]) => {
    if (ev.dateStart <= dateStr && ev.dateEnd >= dateStr) {
      const att = ev.attendees ? Object.values(ev.attendees) : [];
      const yes = att.filter(a => a.status === "yes").length;
      const no = att.filter(a => a.status === "no").length;
      const pending = att.filter(a => !a.status).length;
      evts.push({ id, title: ev.title, yes, no, pending, total: att.length });
    }
  });
  return evts;
}

function fmtStorage(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function renderCreate() {
  return `
    <div class="create-form">
      <div class="create-header">NOUVEL ORDRE</div>
      <div class="field"><label>INTITULE *</label><input id="f-title" type="text" placeholder="EX: EXERCICE TERRAIN" autocapitalize="characters"></div>
      <div class="field"><label>DATE DEBUT *</label><input id="f-date-start" type="date"></div>
      <div class="field"><label>DATE FIN *</label><input id="f-date-end" type="date"></div>
      <div class="field"><label>LIEU</label><input id="f-loc" type="text" placeholder="EX: BASE NORD" autocapitalize="characters"></div>
      <div class="field"><label>DESCRIPTION</label><input id="f-desc" type="text" placeholder="INFORMATIONS COMPLEMENTAIRES" autocapitalize="characters"></div>
      <button class="btn-primary" onclick="doCreate()">VALIDER L'ORDRE</button>
      <button class="btn-secondary" onclick="goBack()">ANNULER</button>
    </div>`;
}

function renderEvent() {
  const ev = state.events[state.activeEventId];
  if (!ev) return "<div class='empty'>EVENEMENT INTROUVABLE</div>";
  const att = ev.attendees ? Object.values(ev.attendees) : [];
  const attEntries = ev.attendees ? Object.entries(ev.attendees) : [];
  const yes = att.filter(a => a.status === "yes").length;
  const no = att.filter(a => a.status === "no").length;
  const pending = att.filter(a => !a.status).length;
  const isAdmin = state.user.role === "admin";
  return `
    <div class="event-detail">
      <div class="ev-header">
        <div class="ev-title-big">${ev.title}</div>
        <div class="ev-date-big">${formatDate(ev.dateStart)} → ${formatDate(ev.dateEnd)}${ev.location ? " / "+ev.location : ""}</div>
        ${ev.desc ? `<div class="ev-desc">${ev.desc}</div>` : ""}
      </div>
      ${isAdmin ? `<button onclick="delEvent(\'${state.activeEventId}\')" style="width:100%;margin-bottom:16px;background:transparent;border:1px solid var(--red);color:var(--red);font-family:var(--font-mono);font-size:11px;letter-spacing:2px;padding:10px;cursor:pointer;">SUPPRIMER CET ORDRE</button>` : ""}
      <div class="stats-bar">
        <div class="stat-box"><span class="stat-num green">${yes}</span><span class="stat-lbl">PRESENTS</span></div>
        <div class="stat-box"><span class="stat-num red">${no}</span><span class="stat-lbl">ABSENTS</span></div>
        <div class="stat-box"><span class="stat-num">${pending}</span><span class="stat-lbl">EN ATTENTE</span></div>
      </div>
      ${!isAdmin ? `
      <div class="my-rsvp">
        <div class="my-rsvp-label">VOTRE REPONSE</div>
        <div class="rsvp-choice">
          <button class="rsvp-yes ${state.pendingStatus === 'yes' ? 'active' : ''}" onclick="chooseStatus('yes')">PRESENT</button>
          <button class="rsvp-no ${state.pendingStatus === 'no' ? 'active' : ''}" onclick="chooseStatus('no')">ABSENT</button>
        </div>
        <button class="validate-rsvp" onclick="validateStatus()">VALIDER</button>
      </div>` : ""}
      <div class="section-label">EFFECTIF — ${att.length} PERSONNE(S)</div>
      ${isAdmin ? `<div class="add-row"><input id="add-name" type="text" placeholder="AJOUTER GRADE NOM..." autocapitalize="characters"><button onclick="addMember()">+</button></div>` : ""}
      <div>
        ${attEntries.length === 0 ? `<div class="empty" style="padding:30px 0">AUCUN MEMBRE AJOUTE</div>` : ""}
        ${attEntries.map(([aid,a]) => `
          <div class="attendee-row">
            <div class="attendee-initial">${a.name[0].toUpperCase()}</div>
            <div class="attendee-name">${a.name}</div>
            <div class="attendee-status ${a.status||'pending'}">${a.status==='yes'?'PRESENT':a.status==='no'?'ABSENT':'EN ATT.'}</div>
            ${isAdmin ? `<button class="del-btn" onclick="delMember('${aid}')">&#10005;</button>` : ""}
          </div>`).join("")}
      </div>
    </div>`;
}

function bindEvents() {
  const loginName = document.getElementById("login-name");
  if (loginName) loginName.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  const addName = document.getElementById("add-name");
  if (addName) addName.addEventListener("keydown", e => { if (e.key === "Enter") addMember(); });
}

window.doLogin = function() {
  const name = document.getElementById("login-name").value.trim().toUpperCase();
  const role = document.getElementById("login-role").value;
  const code = document.getElementById("login-code")?.value || "";
  const errEl = document.getElementById("login-error");
  if (!name) { errEl.textContent = "IDENTIFIANT REQUIS"; return; }
  if (role === "admin" && code !== ADMIN_CODE) { errEl.textContent = "CODE INCORRECT"; return; }
  state.user = { name, role };
  localStorage.setItem("bleu4-user", JSON.stringify(state.user));
  state.screen = "calendar";
  subscribeEvents();
  render();
};

window.prevMonth = function() { state.currentMonth.setMonth(state.currentMonth.getMonth()-1); render(); };
window.nextMonth = function() { state.currentMonth.setMonth(state.currentMonth.getMonth()+1); render(); };
window.goCreate = function() { state.screen = "create"; render(); };
window.goBack = function() { state.screen = "calendar"; state.pendingStatus = null; render(); };
window.goEvent = function(id) { state.activeEventId = id; state.pendingStatus = null; state.screen = "event"; render(); };

window.doCreate = function() {
  const title = document.getElementById("f-title").value.trim().toUpperCase();
  const dateStart = document.getElementById("f-date-start").value;
  const dateEnd = document.getElementById("f-date-end").value;
  const loc = document.getElementById("f-loc").value.trim().toUpperCase();
  const desc = document.getElementById("f-desc").value.trim();
  if (!title || !dateStart || !dateEnd) return;
  const evRef = push(ref(db, "events"));
  set(evRef, { title, dateStart, dateEnd, location: loc, desc, attendees: {} });
  state.activeEventId = evRef.key;
  state.screen = "event";
  render();
};

window.delEvent = function(id) {
  remove(ref(db, `events/${id}`));
  if (state.activeEventId === id) { state.activeEventId = null; state.screen = "calendar"; render(); }
};

window.addMember = function() {
  const input = document.getElementById("add-name");
  const name = input.value.trim().toUpperCase();
  if (!name || !state.activeEventId) return;
  const ev = state.events[state.activeEventId];
  if (ev?.attendees && Object.values(ev.attendees).find(a => a.name === name)) { input.value = ""; return; }
  push(ref(db, `events/${state.activeEventId}/attendees`), { name, status: null });
  input.value = "";
};

window.delMember = function(aid) { remove(ref(db, `events/${state.activeEventId}/attendees/${aid}`)); };

window.chooseStatus = function(status) { state.pendingStatus = status; render(); };

window.validateStatus = function() {
  if (!state.pendingStatus) return;
  const ev = state.events[state.activeEventId];
  if (!ev) return;
  const entries = ev.attendees ? Object.entries(ev.attendees) : [];
  const myEntry = entries.find(([,a]) => a.name === state.user.name);
  if (myEntry) {
    update(ref(db, `events/${state.activeEventId}/attendees/${myEntry[0]}`), { status: state.pendingStatus });
  } else {
    push(ref(db, `events/${state.activeEventId}/attendees`), { name: state.user.name, status: state.pendingStatus });
  }
  state.pendingStatus = null;
};

function subscribeEvents() {
  onValue(ref(db, "events"), snap => {
    state.events = snap.val() || {};
    render();
  });
}

function formatDate(str) {
  if (!str) return "";
  const [y,m,d] = str.split("-");
  const months = ["JAN","FEV","MAR","AVR","MAI","JUN","JUL","AOU","SEP","OCT","NOV","DEC"];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}

if (state.user) { state.screen = "calendar"; subscribeEvents(); } else { render(); }
</script>
</body>
</html>
