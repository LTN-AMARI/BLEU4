<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BLEU4 – Calendrier</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #f5f7fb;
        }

        header {
            padding: 12px 16px;
            background: #1e3a8a;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .month-controls button {
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            background: #2563eb;
            color: #fff;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            padding: 10px;
        }

        .weekday {
            text-align: center;
            font-weight: 600;
            font-size: 12px;
        }

        .day {
            min-height: 52px;
            background: #fff;
            border-radius: 6px;
            border: 1px solid #e5e7eb;
            padding: 4px;
            cursor: pointer;
        }

        .day.has-event {
            background: #fff7e6;
            border-color: #f59e0b;
        }

        .day.today {
            border-color: #2563eb;
            box-shadow: 0 0 0 1px #2563eb;
        }

        .event-panel, .event-form {
            background: #fff;
            margin: 10px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }
    </style>
</head>

<body>
<header>
    <h1>Calendrier BLEU4</h1>
    <div class="month-controls">
        <button id="prevMonthBtn">◀</button>
        <span id="monthLabel"></span>
        <button id="nextMonthBtn">▶</button>
    </div>
</header>

<div class="calendar" id="calendar"></div>

<div class="event-panel">
    <h2>Activités du jour</h2>
    <div id="eventList">Aucune activité.</div>
</div>

<div class="event-form">
    <h2>Créer une activité</h2>

    <label>Date</label>
    <input type="date" id="eventDate">

    <label>Titre</label>
    <input type="text" id="eventTitle">

    <label>Description</label>
    <textarea id="eventDesc"></textarea>

    <button id="saveEventBtn">Enregistrer</button>
</div>

<script src="app-logic.js"></script>
<script src="app.js"></script>
</body>
</html>
