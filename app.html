<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLEU4 – Calendrier Opérationnel</title>

    <style>
        body {
            font-family: "Arial Black", Arial, sans-serif;
            background: #0d1b2a;
            color: #e0e1dd;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #e0e1dd;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        #userInfo {
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            color: #e0e1dd;
        }

        #calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-top: 20px;
        }

        .day {
            background: #1b263b;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #415a77;
        }

        .day:hover {
            background: #415a77;
        }

        #eventPanel {
            margin-top: 25px;
            background: #1b263b;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }

        button {
            padding: 10px 15px;
            background: #778da9;
            color: #0d1b2a;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }

        button:hover {
            background: #e0e1dd;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: none;
        }

        .eventBox {
            background: #415a77;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h1>CALENDRIER OPÉRATIONNEL BLEU4</h1>

    <div id="userInfo"></div>

    <div id="calendar"></div>

    <div id="eventPanel">
        <h2 id="panelDate"></h2>

        <div id="eventList"></div>

        <div id="cmdCreate" style="display:none;">
            <h3>Créer un événement</h3>
            <input id="eventTitle" type="text" placeholder="Titre">
            <textarea id="eventDesc" placeholder="Description"></textarea>
            <button id="createEventBtn">Créer l’événement</button>
        </div>
    </div>

    <script src="app-logic.js"></script>
</body>
</html>
