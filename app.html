<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLEU4 – Calendrier Opérationnel</title>

    <style>
        body {
            font-family: "Arial Black", Arial, sans-serif;
            background: #000000;
            color: #FFD700;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #FFD700;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        #userInfo {
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
        }

        #monthSelector {
            text-align: center;
            margin-bottom: 20px;
        }

        #monthSelector button {
            background: #FFD700;
            color: #000;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin: 0 10px;
        }

        #monthSelector button:hover {
            background: #fff;
        }

        #calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-top: 20px;
        }

        .day {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            border: 2px solid #FFD700;
        }

        .day:hover {
            background: #333;
        }

        .hasEvent {
            background: #FFD700;
            color: #000;
            font-weight: bold;
        }

        #eventPanel {
            margin-top: 25px;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            display: none;
            border: 2px solid #FFD700;
        }

        button {
            padding: 10px 15px;
            background: #FFD700;
            color: #000;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }

        button:hover {
            background: #fff;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: none;
        }

        .eventBox {
            background: #FFD700;
            color: #000;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
        }

        #historyPanel {
            margin-top: 30px;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #FFD700;
        }
    </style>
</head>

<body>

    <h1>CALENDRIER OPÉRATIONNEL BLEU4</h1>

    <div id="userInfo"></div>

    <div id="monthSelector">
        <button id="prevMonth">◀ Mois précédent</button>
        <span id="currentMonth"></span>
        <button id="nextMonth">Mois suivant ▶</button>
    </div>

    <div id="calendar"></div>

    <div id="eventPanel">
        <h2 id="panelDate"></h2>
        <div id="eventList"></div>

        <div id="cmdCreate" style="display:none;">
            <h3>Créer un événement</h3>
            <input id="eventTitle" type="text" placeholder="Titre">
            <textarea id="eventDesc" placeholder="Description"></textarea>
            <button id="createEventBtn">Créer l’événement</button>
        </div>
    </div>

    <div id="historyPanel">
        <h2>Historique des participations</h2>
        <div id="historyList"></div>
    </div>

    <script src="app-logic.js"></script>
</body>
</html>
