<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ACTIVITÉES B4 – Calendrier</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="top-bar">
    <span>GRADE NOM : <strong id="user-info"></strong></span>
    <span>Rôle : <strong id="user-role"></strong></span>
</div>

<h1>Calendrier des Activités</h1>

<div id="calendar"></div>

<div id="activities"></div>

<div id="createEvent">
    <h2>Créer une mission (Commandement)</h2>

    <label>Nom de la mission</label>
    <input id="mission-title" type="text">

    <label>Date de début</label>
    <input id="mission-start" type="date">

    <label>Date de fin</label>
    <input id="mission-end" type="date">

    <label>Personnel concernés</label>
    <p>Mettre <strong>tous</strong> ou une liste de logins séparés par des virgules (ex: SDT_PINGOUIN, SGT_DUPONT).</p>
    <input id="mission-concerned" type="text">

    <button onclick="createMission()">Créer la mission</button>
</div>

<script src="app-logic.js"></script>
<script src="app.js"></script>

<script>
document.getElementById("user-info").textContent =
    currentUser.grade + " " + currentUser.nom;

document.getElementById("user-role").textContent =
    currentUser.role.toUpperCase();
</script>

</body>
</html>
