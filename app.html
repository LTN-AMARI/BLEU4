<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BLEU4 - App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOP BAR -->
<div id="top-bar">
    <span id="userLabel"></span>
    <button onclick="logout()">DÉCONNEXION</button>
</div>

<h1>ACTIVITÉS BLEU4</h1>

<!-- CALENDRIER -->
<div id="calendar"></div>

<!-- CRÉATION MISSION (commandement only) -->
<div id="create" style="display:none;">
    <h3>CRÉER UNE MISSION</h3>

    <input id="mission-title" placeholder="Titre">
    <input id="mission-start" type="date">
    <input id="mission-end" type="date">
    <input id="mission-concerned" placeholder="tous ou logins séparés par virgule">

    <button onclick="createMission()">CRÉER</button>
</div>

<!-- ACTIVITÉS DU JOUR -->
<div id="activities"></div>

<!-- SCRIPTS -->
<script type="module" src="data.js"></script>
<script defer src="calendar.js"></script>

</body>
</html>
